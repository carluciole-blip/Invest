name: Déploiement GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions nécessaires au déploiement Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Une seule publication à la fois ; on annule les déploiements en attente
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configuration de Pages
        uses: actions/configure-pages@v5

      - name: Upload de l'artefact (racine du repo)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Déploiement
        id: deployment
        uses: actions/deploy-pages@v4
